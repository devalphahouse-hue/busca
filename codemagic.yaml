workflows:
  ios-app-store:
    name: iOS App Store
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: buscamotobrasil
    environment:
      groups:
        - ios_credentials
      vars:
        BUNDLE_ID: "br.com.buscamotobrasil.app"
        XCODE_WORKSPACE: "src/Busca Moto Brasil.xcworkspace"
        XCODE_SCHEME: "Busca Moto Brasil"
    scripts:
      - name: Set up certificate and profile
        script: |
          echo $CM_CERTIFICATE | base64 --decode > /tmp/certificate.p12
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo $CM_PROVISIONING_PROFILE | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision
          security create-keychain -p "" build.keychain
          security import /tmp/certificate.p12 -k ~/Library/Keychains/build.keychain -P $CM_CERTIFICATE_PASSWORD -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" ~/Library/Keychains/build.keychain
          security list-keychains -d user -s ~/Library/Keychains/build.keychain
          security default-keychain -s ~/Library/Keychains/build.keychain
      - name: Install CocoaPods
        script: |
          cd src
          pod install
      - name: Build iOS app
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
