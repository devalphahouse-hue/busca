workflows:
  ios-app-store:
    name: iOS App Store
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: buscamotobrasil
    environment:
      groups:
        - ios_credentials
      vars:
        BUNDLE_ID: "br.com.buscamotobrasil.app"
        XCODE_WORKSPACE: "src/Busca Moto Brasil.xcworkspace"
        XCODE_SCHEME: "Busca Moto Brasil"
    scripts:
      - name: Set up keychain
        script: |
          keychain initialize
      - name: Set up certificate
        script: |
          certificate add-certifictes
      - name: Set up provisioning profile
        script: |
          xcode-project use-profiles
      - name: Install CocoaPods
        script: |
          cd src
          pod install
      - name: Build iOS app
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
