workflows:
  ios-app-store:
    name: iOS App Store
    max_build_duration: 120
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Apple API Key
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: br.com.buscamotobrasil.app
      vars:
        APP_STORE_APPLE_ID: 1
        BUNDLE_ID: "br.com.buscamotobrasil.app"
        XCODE_WORKSPACE: "src/Busca Moto Brasil.xcworkspace"
        XCODE_SCHEME: "Busca Moto Brasil"
    scripts:
      - name: Install CocoaPods
        script: |
          cd src
          pod install
      - name: Set up code signing
        script: |
          xcode-project use-profiles
      - name: Build iOS app
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
